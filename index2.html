<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Džemat Pobrdje</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Montserrat', sans-serif;
}

.screen{
    width:1080px;
    height:1920px;
    background:#0097b2;
    display:flex;
    flex-direction:column;
    color:white;
    overflow:hidden;
}

/* VRH */
.header{
    text-align:center;
    padding:25px;
    position:relative;
}

.header h1{
    margin:0;
    font-size:40px;
    font-weight:600;
}

/* PRAVOUGAONIK ZA NAZIV */
.title-box{
    margin:25px auto 0 auto;
    padding:20px 60px;
    background:rgba(0,0,0,0.25);
    border:3px solid #e7d7b9;
    display:inline-block;
}

.title-box h2{
    margin:0;
    font-size:70px;
    font-family:'Cinzel', serif;
    letter-spacing:3px;
}

/* Sat */
.clock{
    position:absolute;
    right:40px;
    top:30px;
    font-size:50px;
    font-weight:700;
}

/* TRAKE */
.bar{
    background:#e7d7b9;
    color:#333;
    text-align:center;
    padding:18px;
    font-size:32px;
    font-weight:600;
    border-top:4px solid #cdbfa4;
    border-bottom:4px solid #cdbfa4;
}

/* NAMAZ VREMENA */
.prayers{
    flex:1.4;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px 120px;
}

.prayer-row{
    display:flex;
    justify-content:space-between;
    padding:25px 0;
    font-size:60px;
    border-bottom:3px solid rgba(255,255,255,0.5);
}

.prayer-name{
    font-weight:800;
}

/* SLEDEĆI NAMAZ */
.next{
    font-size:36px;
}

/* PLAKATI */
.posters{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#007c92;
}

.poster-box{
    width:85%;
    aspect-ratio:16/9;
    background:linear-gradient(135deg,#ffffff33,#00000033);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:600;
    border-radius:20px;
}

/* DONJA TRAKA */
.ticker{
    background:#e7d7b9;
    color:#222;
    font-size:32px;
    padding:15px 0;
    overflow:hidden;
    white-space:nowrap;
}

.ticker span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 20s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}
</style>
</head>
<body>

<div class="screen">

    <div class="header">
        <div class="clock" id="clock"></div>
        <h1>Islamska zajednica u Srbiji</h1>

        <div class="title-box">
            <h2>Džemat Pobrdje</h2>
        </div>
    </div>

    <div class="bar">
        Četvrtak, 26. februar 2026 / 8. ramazan 1447
    </div>

    <div class="prayers">
        <div class="prayer-row"><span class="prayer-name">SABAH</span><span>05:56</span></div>
        <div class="prayer-row"><span class="prayer-name">IZL. SUNCA</span><span>06:16</span></div>
        <div class="prayer-row"><span class="prayer-name">PODNE</span><span>11:52</span></div>
        <div class="prayer-row"><span class="prayer-name">IKINDIJA</span><span>14:50</span></div>
        <div class="prayer-row"><span class="prayer-name">AKŠAM</span><span>17:27</span></div>
        <div class="prayer-row"><span class="prayer-name">JACIJA</span><span>18:46</span></div>
    </div>

    <div class="bar next">
        Sljedeći namaz: <span id="nextName"></span> počinje za <span id="countdown"></span>
    </div>

    <div class="posters">
        <div class="poster-box">
            OVDJE IDE PLAKAT 16:9
        </div>
    </div>

    <div class="ticker">
        <span>Dobrodošli u Džemat Pobrdje • Hutba svakog petka u 12:00 • Mekteb subotom u 10:00 • </span>
    </div>

</div>

<script>
function updateClock(){
    const now = new Date();
    const time = now.toLocaleTimeString('bs-BA',{hour12:false});
    document.getElementById("clock").innerText = time;
}
setInterval(updateClock,1000);
updateClock();

/* NAMAZ VREMENA */
const prayers = [
    {name:"Sabah", time:"05:56"},
    {name:"Podne", time:"11:52"},
    {name:"Ikindija", time:"14:50"},
    {name:"Akšam", time:"17:27"},
    {name:"Jacija", time:"18:46"}
];

function updateCountdown(){
    const now = new Date();
    let nextPrayer = null;
    let nextTime = null;

    for(let p of prayers){
        let [h,m] = p.time.split(":");
        let prayerTime = new Date();
        prayerTime.setHours(h,m,0);

        if(prayerTime > now){
            nextPrayer = p.name;
            nextTime = prayerTime;
            break;
        }
    }

    if(!nextPrayer){
        let [h,m] = prayers[0].time.split(":");
        nextTime = new Date();
        nextTime.setDate(nextTime.getDate()+1);
        nextTime.setHours(h,m,0);
        nextPrayer = prayers[0].name;
    }

    let diff = nextTime - now;
    let hours = Math.floor(diff/1000/60/60);
    let minutes = Math.floor((diff/1000/60)%60);
    let seconds = Math.floor((diff/1000)%60);

    document.getElementById("nextName").innerText = nextPrayer;
    document.getElementById("countdown").innerText =
        String(hours).padStart(2,'0') + ":" +
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0');
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
